spring.application.name=invoice_management_system
#server.port=8888
spring.datasource.url=jdbc:postgresql://localhost:5432/invoice_management_system
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.show-sql=true
logging.level.root=INFO
spring.security.user.name=user
spring.security.user.password=password
logging.level.com.invoice_management_system=DEBUG
logging.level.org.springframework.security=DEBUG
jwt.secret=${JWT_SECRET:change-me-local-dev-secret-change-me}
spring.main.allow-circular-references=true
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
